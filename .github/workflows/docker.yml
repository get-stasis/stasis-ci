name: docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/stasis-ci:latest-amd64
          labels: org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/stasis-ci:latest-arm64
          labels: org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-manifest:
    runs-on: ubuntu-latest
    needs: [build-and-push-amd64, build-and-push-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/stasis-ci:latest \
            ghcr.io/${{ github.repository_owner }}/stasis-ci:latest-amd64 \
            ghcr.io/${{ github.repository_owner }}/stasis-ci:latest-arm64
          
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/stasis-ci:${{ github.sha }} \
            ghcr.io/${{ github.repository_owner }}/stasis-ci:latest-amd64 \
            ghcr.io/${{ github.repository_owner }}/stasis-ci:latest-arm64

      - name: Clean up arch-specific tags
        run: |
          # Remove arch-specific tags (optional, keeps registry clean)
          # docker buildx imagetools rm ghcr.io/${{ github.repository_owner }}/stasis-ci:latest-amd64
          # docker buildx imagetools rm ghcr.io/${{ github.repository_owner }}/stasis-ci:latest-arm64
          echo "Manifest created successfully"
